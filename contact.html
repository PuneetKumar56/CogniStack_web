<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact</title>
  <link href="/CSS/contact.css" rel="stylesheet">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</head>

<body>
  <div id="navbar"></div>
<section class="hero" style="padding: 60px 0;">
    <div class="container">
        <h1 class="section-title" style="text-align:left;">Let's Talk</h1>
        <p>Have a project in mind? We'd love to hear from you.</p>
    </div>
</section>
<section class="section contact-section">
  <div class="container">

    <div class="row g-4">

       <!-- RIGHT: CONTACT INFO -->
      <div class="col-lg-5">

        <div class="info-box text-center">

          <h4 class="mb-4">Contact Information</h4>

          <div class="info-item">
            <i class="fa-solid fa-phone"></i>
            <p class="title">Mobile:</p>
            <h5>+91 9193507411</h5>
            <h5>+91 7505012533</h5>
          </div>

          <div class="info-item">
            <i class="fa-solid fa-envelope"></i>
            <p class="title">Email:</p>
            <h5>cognistacktech@gmail.com</h5>
            <h5>techcode56@gmail.com</h5>

          </div>

          <div class="info-item">
            <i class="fa-solid fa-location-dot"></i>
            <p class="title">Address:</p>
            <h5>Noida, India</h5>
          </div>

        </div>

      </div>

      <!-- LEFT: FORM -->
      <div class="col-lg-7">

        <div class="form-box">
          <div>
            <img src="/Images/message.png" class="img-fluid mb-4" style="border-radius:20px;">
          </div>
          <h3 class="mb-3">
            Just drop your query or requirement, we will get back to you shortly.
          </h3>

          <form id="contactForm">

            <div class="row g-3">

              <div class="col-md-6">
                <input type="text" name="name" id="name" class="form-control" placeholder="Name" required>
              </div>

              <div class="col-md-6">
                <input type="email" name="email" id="email" class="form-control" placeholder="Email" required>
              </div>

              <div class="col-md-6">
                <input type="tel" name="phone" id="phone" class="form-control" placeholder="Phone Number" required>
              </div>

              <div class="col-md-6">
                <select name="service" id="service" class="form-control" required>
                  <option value="">Select Service</option>
                  <option>Website Development</option>
                  <option>Mobile App</option>
                  <option>ERP Software</option>
                  <option>IT Consulting</option>
                </select>
              </div>

              <div class="col-12">
                <textarea name="message" id="message" rows="4" class="form-control"
                  placeholder="Tell us about your requirements"></textarea>
              </div>

              <div class="col-12">
                <button type="submit" class="btn submit-btn" style="color: #fff;">Submit</button>
              </div>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>
</section>
<div id="footer"></div>
  <script>
    // Load Navbar
    fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navbar').innerHTML = data;
      });
    // Load Footer
    fetch('footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      });

    // ✅ EmailJS init
    (function () {
      emailjs.init("7NxtdiNaj8AM2r-6m");
    })();

    document.getElementById("contactForm").addEventListener("submit", function (e) {
      e.preventDefault();

      let form = this;

      // 🔥 1. Send Email
      emailjs.sendForm("service_un7v5ak", "template_6ir3mvq", form)
        .then(function () {
          alert("✅ Email sent successfully!");
        }, function (error) {
          alert("❌ Email failed");
        });

      // 🔥 2. WhatsApp Message
      let name = document.getElementById("name").value;
      let email = document.getElementById("email").value;
      let phone = document.getElementById("phone").value;
      let service = document.getElementById("service").value;
      let message = document.getElementById("message").value;

      let whatsappMsg =
        `Hello, I am ${name}
            Email: ${email}
            Phone: ${phone}
            Service: ${service}
            Message: ${message}`;

      let encodedMsg = encodeURIComponent(whatsappMsg);

      let whatsappNumber = "917505012533"; // 🔥 your number

      let url = `https://wa.me/${whatsappNumber}?text=${encodedMsg}`;

      window.open(url, "_blank");

      form.reset();
    });


  </script>
</body>

</html>

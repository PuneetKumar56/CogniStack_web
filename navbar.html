<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="CSS/navbar.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar bg-white shadow-sm px-3">
  <div class="container-fluid">

    <!-- Logo -->
    <a class="navbar-brand" href="#">
      <img src="/Images/NavLogo.png" id="logoimg" class="img-fluid">
    </a>

    <!-- Mobile Toggle (ONLY <768px) -->
    <button class="btn d-md-none" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
      ☰
    </button>

    <!-- Desktop + Tablet Menu -->
    <div class="d-none d-md-flex ms-auto">
      <ul class="navbar-nav flex-row align-items-center">

        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
        <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link" href="insight.html">Insights</a></li>

      </ul>
    </div>

  </div>
</nav>
<!-- Mobile Sidebar -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
  <div class="offcanvas-header">
    <img src="/Images/NavLogo.png" id="logoimg" class="img-fluid">
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    <!-- add whatsApp Icon -->
    <!-- <i class="fas fa-whatsapp" style="font-size:2rem; color:#3b82f6;"></i> -->
     
  </div>

  <div class="offcanvas-body">

    <div class="menu-grid">
      <a href="index.html" class="menu-item"><img src="/Images/Icons/Home icon.svg" width="50px" alt="Home"><span>Home</span></a>
      <a href="services.html" class="menu-item"><img src="/Images/Icons/services.svg" width="50px" alt="Services"><span>Services</span></a>
      <a href="portfolio.html" class="menu-item"><img src="/Images/Icons/portfolio.svg" width="50px" alt="Portfolio"><span>Portfolio</span></a>
      <a href="about.html" class="menu-item"><img src="/Images/Icons/about.svg" width="50px" alt="About"><span>About</span></a>
      <a href="contact.html" class="menu-item"><img src="/Images/Icons/contact.svg" width="50px" alt="Contact"><span>Contact</span></a>
      <a href="insight.html" class="menu-item"><img src="/Images/Icons/insights.svg" width="50px" alt="Insights"><span>Insights</span></a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
